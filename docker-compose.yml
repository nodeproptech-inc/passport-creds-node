services:
  postgres:
    image: postgres:16-alpine
    container_name: passportcreds-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: passportcreds
      POSTGRES_PASSWORD: passportcreds
      POSTGRES_DB: passportcreds
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U passportcreds -d passportcreds"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
